name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z (e.g. v0.1.0)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build and package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          LDFLAGS="-X main.version=${VERSION}"
          BINS="jib jib-deployer jib-watcher jib-heartbeat"

          for PAIR in linux/amd64 linux/arm64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            DIR="dist/${OS}-${ARCH}"
            mkdir -p "$DIR"
            for BIN in $BINS; do
              GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$DIR/$BIN" "./cmd/$BIN"
            done
            tar -czf "dist/jib-${VERSION}-${OS}-${ARCH}.tar.gz" -C "$DIR" .
          done

          for PAIR in darwin/amd64 darwin/arm64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            DIR="dist/${OS}-${ARCH}"
            mkdir -p "$DIR"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$DIR/jib" ./cmd/jib
            tar -czf "dist/jib-${VERSION}-${OS}-${ARCH}.tar.gz" -C "$DIR" .
          done

      - name: Create tag
        run: |
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: dist/*.tar.gz
