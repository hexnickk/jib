name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Sync package.json version with tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          bun -e '
            const fs = require("fs");
            const p = require("./package.json");
            p.version = process.env.VERSION.replace(/^v/, "");
            fs.writeFileSync("./package.json", JSON.stringify(p, null, 2) + "\n");
            console.log("package.json version:", p.version);
          '

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile apps/cli/main.ts --target=${{ matrix.target }} --outfile dist/jib-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: jib-${{ matrix.target }}
          path: dist/jib-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/jib-*
