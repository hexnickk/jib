name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Sync package version with tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          npm version --no-git-tag-version "$version"
          EXPECTED_VERSION="$version" node -e "const p = require('./package.json'); if (p.version !== process.env.EXPECTED_VERSION) throw new Error(`package version ${p.version} did not match tag ${process.env.EXPECTED_VERSION}`)"

      - name: Build package
        run: npm run build

      - name: Publish to npm with trusted publishing
        run: npm publish --provenance --access public
