name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Determine next version
        id: version
        run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            NEXT="v0.0.1"
          else
            PATCH=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.[0-9]*\.//')
            PREFIX=$(echo "$LAST_TAG" | sed 's/\.[0-9]*$//')
            NEXT="${PREFIX}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Build binaries
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/jib-linux-amd64  ./cmd/jib
          GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/jib-linux-arm64  ./cmd/jib
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/jib-darwin-amd64 ./cmd/jib
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/jib-darwin-arm64 ./cmd/jib

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
