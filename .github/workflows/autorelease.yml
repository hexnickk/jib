name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Determine next version
        id: version
        run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            NEXT="v0.0.1"
          else
            PATCH=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.[0-9]*\.//')
            PREFIX=$(echo "$LAST_TAG" | sed 's/\.[0-9]*$//')
            NEXT="${PREFIX}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Build and package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LDFLAGS="-X main.version=${VERSION}"
          BINS="jib jib-deployer jib-watcher"

          for PAIR in linux/amd64 linux/arm64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            DIR="dist/${OS}-${ARCH}"
            mkdir -p "$DIR"
            for BIN in $BINS; do
              GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$DIR/$BIN" "./cmd/$BIN"
            done
            tar -czf "dist/jib-${VERSION}-${OS}-${ARCH}.tar.gz" -C "$DIR" .
          done

          for PAIR in darwin/amd64 darwin/arm64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            DIR="dist/${OS}-${ARCH}"
            mkdir -p "$DIR"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$DIR/jib" ./cmd/jib
            tar -czf "dist/jib-${VERSION}-${OS}-${ARCH}.tar.gz" -C "$DIR" .
          done

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*.tar.gz
