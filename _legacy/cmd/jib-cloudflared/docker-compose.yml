# Managed by jib-cloudflared — do not edit.
# Written under $JIB_ROOT/cloudflared/docker-compose.yml by `jib-cloudflared install`.
#
# The tunnel token is NOT managed by jib-cloudflared. `jib cloudflare setup`
# writes it as an env file (TUNNEL_TOKEN=...) under config.CredsPath, and
# docker compose loads it via env_file so the secret is passed to the
# container as an environment variable — never mounted as a host file.
name: jib-cloudflared

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    env_file:
      - {{.TunnelEnvPath}}
